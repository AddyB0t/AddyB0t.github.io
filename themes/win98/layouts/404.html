{{ define "main" }}
<div class="dialog98 open" style="z-index:9999;">
  <div class="w98-title">
    <div class="w98-title-left"><span class="w98-title-icon">⚠️</span> Error</div>
  </div>
  <div class="dialog-body">
    <div class="dialog-icon">❌</div>
    <div class="dialog-text">
      <b>Windows cannot find the requested file.</b><br><br>
      The page you are looking for might have been removed or is temporarily unavailable.<br><br>
      Error 404: File Not Found
    </div>
  </div>
  <div class="dialog-btns">
    <button class="dialog-btn" onclick="window.location.href='/'">OK</button>
  </div>
</div>
{{ end }}
