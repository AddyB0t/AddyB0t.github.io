<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError : false,
            trust: (context) => ['\\htmlId', '\\href'].includes(context.command),
            macros: {
                "\\eqref": "\\href{###1}{(\\text{#1})}",
                "\\ref": "\\href{###1}{\\text{#1}}",
                "\\label": "\\htmlId{#1}{}"
            }
        });
    });
</script>



</head>
<body>

<div class="w98-window open" id="win-list" style="top:20px;left:80px;width:750px;height:calc(100vh - 60px);">

    <button class="w98-tb-btn">📁 Folders</button>
  </div>
  <div class="w98-addr">
    <span>Address:</span>
    <input value="C:\Users\Addy\Documents\Categories\" readonly>
  </div>
  <div class="w98-body" style="height:calc(100% - 90px);">
    <table class="list-view">
      <thead><tr><th>Name</th><th>Type</th><th>Date Modified</th></tr></thead>

  <div class="w98-status">

</div>
